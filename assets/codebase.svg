<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="320" viewBox="0 0 1200 320" role="img" aria-labelledby="title desc">
  <title id="title">Selected codebase footprint</title>
  <desc id="desc">A snapshot of 555.6 thousand physical source lines across newwei and nini.</desc>
  <defs>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b0e13"/>
      <stop offset="1" stop-color="#111722"/>
    </linearGradient>
    <linearGradient id="main" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2748d7"/>
      <stop offset="0.82" stop-color="#6f87ff"/>
      <stop offset="1" stop-color="#d8ddff"/>
    </linearGradient>
    <linearGradient id="open" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ff5138"/>
      <stop offset="1" stop-color="#ff9d68"/>
    </linearGradient>
  </defs>
  <rect x="1" y="1" width="1198" height="318" rx="18" fill="url(#panel)" stroke="#303844"/>
  <g font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
    <text x="48" y="55" fill="#7f8a98" font-size="13" font-weight="650" letter-spacing="3.6">SELECTED CODEBASE / SOURCE FOOTPRINT</text>
    <text x="48" y="126" fill="#f0eee8" font-size="57" font-weight="680" letter-spacing="-2">555.6K</text>
    <text x="260" y="124" fill="#7f8a98" font-size="15" letter-spacing="1.2">PHYSICAL SOURCE LINES</text>
    <text x="48" y="162" fill="#697382" font-size="13" letter-spacing="2.2">1,932 FILES · 2 ALLOWLISTED CODEBASES · NO FORKS</text>

    <text x="48" y="218" fill="#cdd3dc" font-size="14" font-weight="620" letter-spacing="1.2">NEWWEI</text>
    <text x="1118" y="218" fill="#cdd3dc" font-size="14" font-weight="620" text-anchor="end">544.3K</text>
    <rect x="48" y="232" width="1070" height="12" rx="6" fill="#202632"/>
    <rect x="48" y="232" width="1048" height="12" rx="6" fill="url(#main)"/>

    <text x="48" y="278" fill="#cdd3dc" font-size="14" font-weight="620" letter-spacing="1.2">NINI / OPEN SOURCE</text>
    <text x="1118" y="278" fill="#cdd3dc" font-size="14" font-weight="620" text-anchor="end">11.3K</text>
    <rect x="48" y="292" width="1070" height="8" rx="4" fill="#202632"/>
    <rect x="48" y="292" width="22" height="8" rx="4" fill="url(#open)"/>
  </g>
</svg>
