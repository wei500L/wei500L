name: Profile metrics

on:
  schedule:
    - cron: "17 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/workflows/metrics.yml

permissions:
  contents: write

concurrency:
  group: profile-metrics
  cancel-in-progress: true

jobs:
  calendar:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Generate contribution calendar
        uses: lowlighter/metrics@65836723097537a54cd8eb90f61839426b4266b6 # v3.34
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: wei500L
          filename: metrics.svg
          template: classic
          base: ""

          config_timezone: Asia/Shanghai
          config_display: regular
          config_order: isocalendar
          config_animations: yes
          plugins_errors_fatal: yes

          commits_authoring: wei500L, WEI

          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

          output_action: commit
          committer_branch: main
          committer_message: "chore: refresh contribution metrics [skip ci]"

  code:
    needs: calendar
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Generate code metrics
        uses: lowlighter/metrics@65836723097537a54cd8eb90f61839426b4266b6 # v3.34
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: wei500L
          filename: metrics-code.svg
          template: classic
          base: ""

          config_timezone: Asia/Shanghai
          config_display: regular
          config_order: languages, lines
          config_animations: yes
          plugins_errors_fatal: yes

          commits_authoring: wei500L, WEI

          plugin_languages: yes
          plugin_languages_sections: most-used
          plugin_languages_details: percentage
          plugin_languages_limit: 6
          plugin_languages_threshold: 2%
          plugin_languages_categories: programming, markup

          plugin_lines: yes
          plugin_lines_sections: repositories
          plugin_lines_repositories_limit: 6
          plugin_lines_delay: 30

          repositories_affiliations: owner
          repositories_forks: no
          repositories_skipped: |
            @use.patterns
            */*
            +wei500L/nini
            +wei500L/duckmail
            +wei500L/cai2
            +wei500L/huo
            +wei500L/26
            +wei500L/yun

          output_action: commit
          committer_branch: main
          committer_message: "chore: refresh code metrics [skip ci]"
