name: Profile metrics

on:
  schedule:
    - cron: "17 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/workflows/metrics.yml

permissions:
  contents: write

concurrency:
  group: profile-metrics
  cancel-in-progress: true

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Generate profile metrics
        uses: lowlighter/metrics@65836723097537a54cd8eb90f61839426b4266b6 # v3.34
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: wei500L
          filename: metrics.svg
          template: classic
          base: ""

          config_timezone: Asia/Shanghai
          config_display: large
          config_order: isocalendar, languages, lines
          config_animations: yes
          plugins_errors_fatal: yes

          commits_authoring: wei500L, WEI

          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

          plugin_languages: yes
          plugin_languages_sections: most-used
          plugin_languages_details: percentage
          plugin_languages_limit: 6
          plugin_languages_threshold: 2%
          plugin_languages_categories: programming, markup

          plugin_lines: yes
          plugin_lines_sections: repositories, history
          plugin_lines_repositories_limit: 6
          plugin_lines_history_limit: 1
          plugin_lines_delay: 30

          repositories_affiliations: owner
          repositories_forks: no
          repositories_skipped: |
            @use.patterns
            */*
            +wei500L/nini
            +wei500L/yun
            +wei500L/26
            +wei500L/huo
            +wei500L/cai2
            +wei500L/ai516
            +wei500L/duckmail

          output_action: commit
          committer_branch: main
          committer_message: "chore: refresh profile metrics [skip ci]"

  coding-rhythm:
    needs: generate
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out the refreshed profile
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: main
          fetch-depth: 0

      - name: Generate productive-time card
        uses: vn7n24fzkq/github-profile-summary-cards@89776cd44fb40c4f7b3e5c2db993728cd700d638 # release
        env:
          GITHUB_TOKEN: ${{ secrets.METRICS_TOKEN }}
        with:
          USERNAME: wei500L
          BRANCH_NAME: main
          UTC_OFFSET: 8
          THEME: github_dark
          ANIMATION: rise
          DURATION: 2.5
          NAME: 500L
          AUTO_PUSH: true
